<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Ray App</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
.server-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px; }
.page-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px; }
.page-title { font-size:1.5rem;font-weight:800; }
.server-dot { width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0; }
.limit-bar { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px; }
.limit-item { display:flex;align-items:center;gap:6px; }
.prereq-modal { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px; }
.prereq-item { display:flex;align-items:center;gap:12px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:.88rem; }
.prereq-item .pi-icon { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem; }
.prereq-item .pi-label { flex:1; }
.prereq-item .pi-btn { padding:6px 14px;font-size:.78rem; }
.check-done { color:var(--success);font-weight:700; }
</style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div id="toast-container"></div>

<div class="page-wrap">
  <div class="container section">

    <div class="page-head">
      <div>
        <div class="page-title">Dashboard</div>
        <div style="color:var(--muted);font-size:.85rem" id="welcome-text">Selamat datang!</div>
      </div>
      <button class="btn btn-primary" id="btn-create">
        + Buat Server
      </button>
    </div>

    <!-- LIMIT INFO -->
    <div class="limit-bar" id="limit-bar">
      <div class="limit-item">
        <span style="color:var(--text)">Server:</span>
        <strong id="lim-servers">-/4</strong>
      </div>
      <div class="limit-item">
        <span style="color:var(--text)">Buat hari ini:</span>
        <strong id="lim-daily">-/2</strong>
      </div>
      <div class="limit-item" style="margin-left:auto;font-size:.75rem;opacity:.7">
        Server tidak aktif 7 hari otomatis dihapus
      </div>
    </div>

    <!-- SERVERS GRID -->
    <div id="servers-wrap">
      <div class="empty-state" id="loading-state">
        <div class="spinner" style="width:32px;height:32px"></div>
        <div>Memuat server...</div>
      </div>
      <div class="server-grid" id="server-grid" style="display:none"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">&#9729;</div>
        <div class="empty-title">Belum ada server</div>
        <div class="empty-sub">Klik "Buat Server" untuk mulai hosting website pertamamu</div>
        <button class="btn btn-primary" id="btn-create2" style="margin-top:8px">+ Buat Server Pertama</button>
      </div>
    </div>
  </div>
</div>

<!-- CREATE SERVER MODAL -->
<div id="create-modal" style="display:none"><!-- rendered via JS --></div>

<script src="/assets/js/utils.js"></script>
<script>
if (!requireLogin()) throw new Error('not logged in');
renderNavbar('dashboard');

const BASE_URL = window.location.origin;
let userData = null;
let servers = [];

// ─── LOAD DATA ────────────────────────────────
async function loadAll() {
  // User info
  const ur = await apiFetch('/auth/me');
  if (!ur?.ok) return;
  userData = ur.data;
  setUser({ username: userData.username, role: userData.role });

  document.getElementById('welcome-text').textContent = `Halo, ${userData.username}!`;

  // Reset daily counter display
  const now = Date.now();
  const reset = new Date(userData.dailyCreatesReset).getTime();
  const dailyCount = (now - reset > 86400000) ? 0 : userData.dailyCreates;
  document.getElementById('lim-servers').textContent = `${userData.serverCount}/4`;
  document.getElementById('lim-daily').textContent = `${dailyCount}/2`;
  document.getElementById('lim-servers').style.color = userData.serverCount >= 4 ? 'var(--danger)' : 'var(--success)';
  document.getElementById('lim-daily').style.color = dailyCount >= 2 ? 'var(--danger)' : 'var(--text)';

  // Servers
  const sr = await apiFetch('/servers');
  document.getElementById('loading-state').style.display = 'none';
  if (!sr?.ok) return;
  servers = sr.data.servers;
  renderServers();
}

function renderServers() {
  const grid = document.getElementById('server-grid');
  const empty = document.getElementById('empty-state');
  if (!servers.length) { empty.style.display = 'flex'; grid.style.display = 'none'; return; }
  empty.style.display = 'none';
  grid.style.display = 'grid';

  grid.innerHTML = servers.map(s => {
    const url = `${BASE_URL}/s/${s.name}/`;
    const lastReq = s.lastRequest ? fmtRelative(s.lastRequest) : 'Belum ada';
    const daysLeft = s.lastRequest ? Math.ceil((7*86400000 - (Date.now()-new Date(s.lastRequest)))/86400000) : 7;
    const sizeStr = fmtSize(s.totalSize || 0);
    const daysColor = daysLeft <= 2 ? 'var(--danger)' : daysLeft <= 4 ? 'var(--warning)' : 'var(--success)';

    return `<div class="server-card" data-id="${s._id}">
      <div class="server-name">
        <span class="server-dot"></span>
        ${escapeHtml(s.name)}
        <span class="badge badge-active" style="margin-left:auto">Aktif</span>
      </div>
      <div class="server-url">
        <span style="cursor:pointer;color:var(--accent)" onclick="copyText('${url}')">${url}</span>
      </div>
      <div class="server-meta">
        <span>&#128203; ${s.totalFiles || 0} file</span>
        <span>&#128190; ${sizeStr}</span>
        <span>&#128202; ${s.totalRequests || 0} req</span>
        <span>&#9203; ${lastReq}</span>
        <span style="color:${daysColor}">&#9888; ${daysLeft > 0 ? daysLeft+'h' : 'Expired'} tersisa</span>
      </div>
      <div class="server-actions">
        <button class="btn btn-primary btn-sm" onclick="openFileManager('${s._id}','${escapeHtml(s.name)}')">Kelola File</button>
        <a href="${url}" target="_blank" class="btn btn-ghost btn-sm">Buka</a>
        <button class="btn btn-ghost btn-sm" onclick="copyText('${url}')">Salin URL</button>
        <button class="btn btn-danger btn-sm" onclick="deleteServer('${s._id}','${escapeHtml(s.name)}')">Hapus</button>
      </div>
    </div>`;
  }).join('');
}

// ─── FILE MANAGER NAV ─────────────────────────
function openFileManager(id, name) {
  window.location.href = `/filemanager?server=${id}&name=${encodeURIComponent(name)}`;
}

// ─── DELETE SERVER ────────────────────────────
function deleteServer(id, name) {
  confirmModal('Hapus Server', `Hapus server "${name}"? Semua file akan hilang permanen.`, async () => {
    const r = await apiFetch(`/servers/${id}`, { method: 'DELETE' });
    if (r?.ok) { toast('Server berhasil dihapus.', 'success'); loadAll(); }
    else toast(r?.data?.message || 'Gagal menghapus.', 'error');
  }, true);
}

// ─── CREATE SERVER ────────────────────────────
function openCreateModal() {
  if (userData?.serverCount >= 4) return toast('Maksimal 4 server per akun.', 'error');

  const WA_URL = 'https://whatsapp.com/channel/0029Vb89VkwLNSZyIqpdbX3t';
  const TT_URL = 'https://www.tiktok.com/@rayapp_host';

  let waOk = false, ttOk = false;

  const { overlay, close } = showModal({
    title: 'Buat Server Baru',
    body: `
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="font-size:.85rem;color:var(--muted)">Sebelum membuat server, ikuti dulu channel kami:</div>

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">
            <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#25d366,#128c7e);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0">W</div>
            <div style="flex:1;font-size:.85rem"><div style="font-weight:600">WhatsApp Channel</div><div style="color:var(--muted);font-size:.75rem">Ikuti untuk info update terbaru</div></div>
            <button class="btn btn-success btn-sm" id="btn-wa" onclick="openPrereq('wa')">Ikuti</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px">
            <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#ff0050,#010101);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0">T</div>
            <div style="flex:1;font-size:.85rem"><div style="font-weight:600">TikTok</div><div style="color:var(--muted);font-size:.75rem">Follow @rayapp_host</div></div>
            <button class="btn btn-danger btn-sm" id="btn-tt" onclick="openPrereq('tt')">Follow</button>
          </div>
        </div>

        <hr style="border:none;border-top:1px solid var(--border)">

        <div class="input-group">
          <label>Nama Folder / Server</label>
          <input type="text" id="server-name-input" placeholder="contoh: portfolio, myblog, toko-online" maxlength="30">
          <div style="font-size:.73rem;color:var(--subtle);margin-top:3px" id="server-url-preview">URL: <span style="color:var(--muted)">masukkan nama folder...</span></div>
        </div>
        <div style="font-size:.78rem;color:var(--muted);background:var(--surface);padding:10px;border-radius:8px;line-height:1.6">
          Huruf kecil, angka, strip, underscore. 3-30 karakter.<br>
          Nama tidak bisa sama dengan milik orang lain.
        </div>
      </div>`,
    confirmText: 'Buat Server',
    confirmClass: 'btn-primary',
    onConfirm: async (_, closeModal) => {
      if (!waOk || !ttOk) return toast('Ikuti WA Channel dan TikTok dulu.', 'warning');
      const name = document.getElementById('server-name-input').value.trim();
      if (!name) return toast('Nama folder wajib diisi.', 'error');

      const btn = overlay.querySelector('.btn-confirm');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Membuat...';

      const r = await apiFetch('/servers/create', {
        method: 'POST',
        body: JSON.stringify({ name, waConfirmed: true, tiktokConfirmed: true })
      });
      btn.disabled = false; btn.textContent = 'Buat Server';

      if (r?.ok) {
        toast(`Server "${name}" berhasil dibuat!`, 'success');
        closeModal();
        loadAll();
      } else {
        toast(r?.data?.message || 'Gagal membuat server.', 'error');
      }
    }
  });

  // Server name preview
  overlay.querySelector('#server-name-input')?.addEventListener('input', function() {
    const v = this.value.trim().toLowerCase().replace(/\s+/g,'-');
    const preview = overlay.querySelector('#server-url-preview');
    if (preview) preview.innerHTML = `URL: <span style="color:var(--accent);font-family:monospace">${window.location.origin}/s/${escapeHtml(v)||'namafolder'}/</span>`;
  });

  // Prereq buttons
  window.openPrereq = function(type) {
    const url = type === 'wa' ? WA_URL : TT_URL;
    const win = window.open(url, '_blank');
    // After 2s assume done (redirect logic)
    setTimeout(() => {
      if (type === 'wa') {
        waOk = true;
        const btn = overlay.querySelector('#btn-wa');
        if (btn) { btn.textContent = 'Sudah'; btn.className = 'btn btn-ghost btn-sm check-done'; btn.disabled = true; }
      } else {
        ttOk = true;
        const btn = overlay.querySelector('#btn-tt');
        if (btn) { btn.textContent = 'Sudah'; btn.className = 'btn btn-ghost btn-sm check-done'; btn.disabled = true; }
      }
      if (waOk && ttOk) toast('Terima kasih! Sekarang isi nama folder.', 'success');
    }, 1500);
  };
}

document.getElementById('btn-create').addEventListener('click', openCreateModal);
document.getElementById('btn-create2')?.addEventListener('click', openCreateModal);

loadAll();
</script>
</body>
</html>
