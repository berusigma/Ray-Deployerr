<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Ray App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div id="toasts"></div>

<div class="page">
  <div class="container section">

    <!-- Header -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:28px">
      <div>
        <h1 style="font-size:1.6rem;margin-bottom:4px">Dashboard</h1>
        <p id="welcome" style="color:var(--muted);font-size:.9rem">Memuat...</p>
      </div>
      <button class="btn btn-primary" id="btn-new">+ Buat Server</button>
    </div>

    <!-- Limit bar -->
    <div id="limit-bar" style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:20px;display:flex;gap:20px;flex-wrap:wrap;font-size:.82rem;color:var(--muted);align-items:center">
      <span>Server: <strong id="lim-srv" style="color:var(--text)">—</strong></span>
      <span>Buat hari ini: <strong id="lim-day" style="color:var(--text)">—</strong></span>
      <span style="margin-left:auto;font-size:.72rem">Server tidak aktif 7 hari otomatis dihapus</span>
    </div>

    <!-- Servers -->
    <div id="srv-area">
      <div class="empty" id="loading"><div class="spinner lg"></div><div class="empty-title" style="margin-top:8px">Memuat...</div></div>
      <div class="server-grid" id="srv-grid" style="display:none"></div>
      <div class="empty" id="srv-empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <div class="empty-title">Belum ada server</div>
        <div class="empty-sub">Klik "Buat Server" untuk mulai hosting website pertamamu</div>
        <button class="btn btn-primary" style="margin-top:8px" id="btn-new2">+ Buat Server Pertama</button>
      </div>
    </div>

  </div>
</div>

<script src="/app.js"></script>
<script>
if (!requireLogin()) throw 0;
buildNav('dash');

const BASE = location.origin;
let me = null;

async function loadMe() {
  const d = await api('/auth/me');
  if (!d?.ok) return;
  me = d.user;
  Store.setAuth(Store.token(), { username: me.username, role: me.role });
  buildNav('dash');
  document.getElementById('welcome').textContent = `Halo, ${me.username}! 👋`;
  document.getElementById('lim-srv').textContent = `${me.serverCount}/4`;
  document.getElementById('lim-day').textContent = `${me.dailyCreates}/2`;
  document.getElementById('lim-srv').style.color = me.serverCount >= 4 ? 'var(--danger)' : 'var(--success)';
  document.getElementById('lim-day').style.color = me.dailyCreates >= 2 ? 'var(--danger)' : 'var(--text)';
}

async function loadServers() {
  const d = await api('/server/list');
  document.getElementById('loading').style.display = 'none';
  if (!d?.ok) { toast('Gagal memuat server.', 'err'); return; }

  const servers = d.servers;
  if (!servers.length) { document.getElementById('srv-empty').style.display = 'flex'; return; }

  const grid = document.getElementById('srv-grid');
  grid.style.display = 'grid';
  grid.innerHTML = servers.map(s => {
    const daysLeft = s.lastRequestAt
      ? Math.max(0, Math.ceil((7*86400000 - (Date.now() - new Date(s.lastRequestAt))) / 86400000))
      : 7;
    const dayColor = daysLeft <= 1 ? 'var(--danger)' : daysLeft <= 3 ? 'var(--warning)' : 'var(--success)';
    return `<div class="server-card">
      <div class="server-name">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0"></div>
        ${esc(s.name)}
        <span class="badge badge-green" style="margin-left:auto">Aktif</span>
      </div>
      <div class="server-url" onclick="copy('${esc(s.url)}')" title="Klik untuk salin">${esc(s.url)}</div>
      <div class="server-meta">
        <span>${fmtBytes(s.totalSize)} storage</span>
        <span>${s.totalRequests} request</span>
        <span>Terakhir: ${fmtAgo(s.lastRequestAt)}</span>
        <span style="color:${dayColor};font-weight:500">${daysLeft}h sebelum dihapus</span>
      </div>
      <div class="server-actions">
        <button class="btn btn-primary btn-sm" onclick="goFM('${s.id}','${esc(s.name)}')">Kelola File</button>
        <a href="${esc(s.url)}" target="_blank" class="btn btn-ghost btn-sm">Buka ↗</a>
        <button class="btn btn-ghost btn-sm" onclick="copy('${esc(s.url)}')">Salin URL</button>
        <button class="btn btn-danger btn-sm" onclick="delServer('${s.id}','${esc(s.name)}')">Hapus</button>
      </div>
    </div>`;
  }).join('');
}

function goFM(id, name) {
  location.href = `/filemanager?id=${id}&name=${encodeURIComponent(name)}`;
}

async function delServer(id, name) {
  confirm('Hapus Server', `Hapus server "${name}"? Semua file akan hilang permanen.`, async () => {
    const d = await api(`/server/${id}`, { method: 'DELETE' });
    if (d?.ok) { toast('Server dihapus.', 'ok'); loadAll(); }
    else toast(d?.msg || 'Gagal.', 'err');
  }, true);
}

function openCreateModal() {
  if (me?.serverCount >= 4) return toast('Maksimal 4 server per akun.', 'err');
  if (me?.dailyCreates >= 2) return toast('Batas harian tercapai. Coba besok.', 'warn');

  const WA = 'https://whatsapp.com/channel/0029Vb89VkwLNSZyIqpdbX3t';
  const TT = 'https://www.tiktok.com/@rayapp_host';
  let waOk = false, ttOk = false;

  const { bg, close } = modal({
    title: 'Buat Server Baru',
    body: `
      <div style="display:flex;flex-direction:column;gap:14px">
        <p style="font-size:.85rem;color:var(--muted)">Ikuti channel kami dulu sebelum membuat server:</p>

        <div style="border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">
            <div style="width:36px;height:36px;border-radius:9px;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:.85rem">WA</div>
            <div style="flex:1;font-size:.85rem"><div style="font-weight:600">WhatsApp Channel</div><div style="color:var(--muted);font-size:.75rem">Update terbaru Ray App</div></div>
            <button class="btn btn-success btn-sm" id="wa-btn" onclick="openSocial('wa')">Ikuti</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px">
            <div style="width:36px;height:36px;border-radius:9px;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:.85rem">TT</div>
            <div style="flex:1;font-size:.85rem"><div style="font-weight:600">TikTok</div><div style="color:var(--muted);font-size:.75rem">@rayapp_host</div></div>
            <button class="btn btn-ghost btn-sm" id="tt-btn" onclick="openSocial('tt')">Follow</button>
          </div>
        </div>

        <div class="field">
          <label>Nama Folder Server</label>
          <input class="input" type="text" id="srv-name" placeholder="contoh: portfolio, toko, blog" maxlength="30" spellcheck="false">
          <span style="font-size:.72rem;color:var(--subtle)">Huruf kecil, angka, strip. 3–30 karakter.</span>
          <div id="url-prev" style="font-size:.75rem;color:var(--muted);margin-top:2px"></div>
        </div>
      </div>`,
    ok: 'Buat Server',
    onOk: async (el, closeM) => {
      if (!waOk || !ttOk) return toast('Ikuti WA dan TikTok dulu.', 'warn');
      const name = document.getElementById('srv-name').value.trim().toLowerCase().replace(/\s+/g,'-');
      if (!name) return toast('Nama server wajib diisi.', 'err');

      const btn = el.querySelector('._ok');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Membuat...';

      const d = await api('/server/create', { method: 'POST', body: { name } });
      btn.disabled = false; btn.textContent = 'Buat Server';

      if (d?.ok) { toast(`Server "${name}" berhasil dibuat!`, 'ok'); closeM(); loadAll(); }
      else toast(d?.msg || 'Gagal.', 'err');
    }
  });

  document.getElementById('srv-name')?.addEventListener('input', function() {
    const v = this.value.trim().toLowerCase().replace(/\s+/g,'-') || 'namakamu';
    const prev = document.getElementById('url-prev');
    if (prev) prev.innerHTML = `URL: <code style="color:var(--primary)">${location.origin}/s/${esc(v)}/</code>`;
  });

  window.openSocial = function(type) {
    window.open(type === 'wa' ? WA : TT, '_blank');
    setTimeout(() => {
      if (type === 'wa') {
        waOk = true;
        const b = document.getElementById('wa-btn');
        if (b) { b.textContent = '✓ Sudah'; b.className = 'btn btn-ghost btn-sm'; b.disabled = true; b.style.color = 'var(--success)'; }
      } else {
        ttOk = true;
        const b = document.getElementById('tt-btn');
        if (b) { b.textContent = '✓ Sudah'; b.className = 'btn btn-ghost btn-sm'; b.disabled = true; b.style.color = 'var(--success)'; }
      }
    }, 1500);
  };
}

async function loadAll() {
  await Promise.all([loadMe(), loadServers()]);
}

document.getElementById('btn-new').addEventListener('click', openCreateModal);
document.getElementById('btn-new2')?.addEventListener('click', openCreateModal);

loadAll();
</script>
</body>
</html>
