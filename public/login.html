<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Masuk — Ray App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div id="toasts"></div>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2 L2 7 L12 12 L22 7 Z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 17 L12 22 L22 17" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12 L12 17 L22 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 style="font-size:1.25rem;margin-top:8px">Masuk ke Ray App</h2>
      <p style="font-size:.82rem;color:var(--muted);margin-top:4px">Selamat datang kembali!</p>
    </div>

    <div id="err-box" style="display:none"></div>

    <div class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input class="input" type="text" id="username" placeholder="Username kamu" autocomplete="username" autofocus spellcheck="false">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div style="position:relative">
          <input class="input" type="password" id="password" placeholder="Password kamu" autocomplete="current-password" style="padding-right:42px">
          <button type="button" id="eye" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem">&#128065;</button>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-login" style="width:100%;padding:12px;font-size:.95rem">Masuk</button>

      <p style="text-align:center;font-size:.85rem;color:var(--muted)">
        Belum punya akun? <a href="/register">Daftar gratis</a>
      </p>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
buildNav('login');
if (Store.token()) location.href = '/dashboard';

document.getElementById('eye').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.style.color = pw.type === 'text' ? 'var(--primary)' : 'var(--muted)';
});

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.className = 'alert alert-red';
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  document.getElementById('err-box').style.display = 'none';
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  if (!username || !password) return showErr('Isi username dan password.');

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Masuk...';

  const data = await api('/auth/login', { method: 'POST', body: { username, password } });

  btn.disabled = false;
  btn.textContent = 'Masuk';

  if (!data) return;
  if (data.ok) {
    Store.setAuth(data.token, { username: data.username, role: data.role });
    toast('Berhasil masuk!', 'ok');
    const rd = new URLSearchParams(location.search).get('redirect') || '/dashboard';
    setTimeout(() => location.href = rd, 400);
  } else {
    showErr(data.msg || 'Login gagal.');
    document.getElementById('password').value = '';
  }
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
