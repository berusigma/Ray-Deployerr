<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>File Manager — Ray App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  body { overflow: hidden; }
  .fm-mob-toggle { display:none; position:fixed; bottom:16px; left:16px; z-index:200; background:var(--primary); color:#fff; border:none; border-radius:50%; width:46px; height:46px; font-size:1.2rem; cursor:pointer; box-shadow:var(--sh-md); }
  @media(max-width:768px){ .fm-mob-toggle { display:flex; align-items:center; justify-content:center; } }
  .fm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:299; }
  .fm-overlay.show { display:block; }
</style>
</head>
<body>

<!-- Navbar (simplified for FM) -->
<nav class="nav" style="z-index:400" id="nav-fm">
  <a href="/" class="nav-brand" style="text-decoration:none">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L2 7 L12 12 L22 7 Z"/><path d="M2 17 L12 22 L22 17"/><path d="M2 12 L12 17 L22 12"/></svg>
    </div>
    Ray App
  </a>
  <div id="nav-server-info" style="font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:8px;margin-left:12px">
    <span id="nav-srv-name" style="font-weight:600;color:var(--text)"></span>
    <a id="nav-srv-url" href="#" target="_blank" style="font-size:.75rem;color:var(--primary);font-family:monospace"></a>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <a href="/dashboard" class="btn btn-ghost btn-sm">← Dashboard</a>
    <button id="btn-dl-all" class="btn btn-ghost btn-sm" title="Download semua sebagai ZIP">↓ ZIP</button>
  </div>
</nav>
<div id="toasts"></div>
<div class="fm-overlay" id="fm-overlay"></div>

<div class="fm-layout">
  <!-- Sidebar / Tree -->
  <div class="fm-sidebar" id="fm-sidebar">
    <div class="fm-sidebar-head">
      <div style="font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:6px">Storage</div>
      <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" id="stor-bar" style="width:0%"></div></div>
      <div style="font-size:.72rem;color:var(--muted)" id="stor-label">0 B / 50 MB</div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn btn-primary btn-sm" id="btn-upload" style="flex:1;justify-content:center">↑ Upload</button>
        <button class="btn btn-ghost btn-sm" id="btn-mkdir" title="Buat Folder">+Dir</button>
        <button class="btn btn-ghost btn-sm" id="btn-refresh" title="Refresh">↺</button>
      </div>
    </div>
    <div class="fm-tree" id="fm-tree">
      <div style="padding:12px;color:var(--muted);font-size:.8rem">Memuat...</div>
    </div>
  </div>

  <!-- Main content -->
  <div class="fm-main">
    <div class="fm-bar">
      <div class="fm-breadcrumb" id="fm-bread">
        <span class="fm-crumb" data-path="">⌂ root</span>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-danger btn-sm" id="btn-del-sel" style="display:none">Hapus Pilihan</button>
      </div>
    </div>

    <div class="fm-content" id="fm-content">
      <div class="empty"><div class="spinner lg"></div><div class="empty-title" style="margin-top:8px">Memuat...</div></div>
    </div>

    <!-- Upload progress -->
    <div id="upload-area" style="display:none;border-top:1.5px solid var(--border);padding:10px 14px;background:var(--surface);max-height:130px;overflow-y:auto">
      <div class="upload-list" id="upload-list"></div>
    </div>

    <div class="fm-statusbar">
      <span id="status-count">0 item</span>
      <span id="status-sel" style="display:none;color:var(--primary);font-weight:600"></span>
      <span style="margin-left:auto;font-family:monospace" id="status-path">/</span>
    </div>
  </div>
</div>

<!-- Mobile toggle -->
<button class="fm-mob-toggle" id="fm-mob-btn" title="File Tree">≡</button>

<!-- Hidden file input -->
<input type="file" id="file-input" multiple style="display:none">

<script src="/app.js"></script>
<script>
if (!requireLogin()) throw 0;

// ── Params ────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const SRV_ID   = params.get('id');
const SRV_NAME = params.get('name') || '';

if (!SRV_ID) { alert('Server tidak ditemukan.'); location.href = '/dashboard'; }

// ── State ─────────────────────────────────────────
let allFiles    = [];   // flat array from server
let curPath     = '';   // current folder path
let selected    = new Set();
let ctxMenu     = null;
let dragTarget  = null;

// ── Server URL ────────────────────────────────────
const SRV_URL = `${location.origin}/s/${SRV_NAME}/`;
document.getElementById('nav-srv-name').textContent = SRV_NAME;
const urlEl = document.getElementById('nav-srv-url');
urlEl.textContent = SRV_URL;
urlEl.href = SRV_URL;

// ── Mobile sidebar ────────────────────────────────
document.getElementById('fm-mob-btn').addEventListener('click', () => {
  document.getElementById('fm-sidebar').classList.toggle('open');
  document.getElementById('fm-overlay').classList.toggle('show');
});
document.getElementById('fm-overlay').addEventListener('click', () => {
  document.getElementById('fm-sidebar').classList.remove('open');
  document.getElementById('fm-overlay').classList.remove('show');
});

// ── Load data ─────────────────────────────────────
async function load() {
  const d = await api(`/server/${SRV_ID}/files`);
  if (!d?.ok) { toast(d?.msg || 'Gagal memuat.', 'err'); return; }

  allFiles = d.files.filter(f => !f.filePath.endsWith('/.keep'));

  // Storage bar
  const used = d.server.totalSize || 0;
  const max  = 50 * 1024 * 1024;
  const pct  = Math.min(100, (used / max) * 100);
  document.getElementById('stor-bar').style.width = pct + '%';
  document.getElementById('stor-bar').className = 'prog-fill' + (pct > 85 ? ' danger' : pct > 60 ? ' warn' : '');
  document.getElementById('stor-label').textContent = `${fmtBytes(used)} / 50 MB`;

  renderTree();
  renderContent();
}

// ── Tree ──────────────────────────────────────────
function renderTree() {
  const tree = document.getElementById('fm-tree');
  const folders = new Set();
  allFiles.forEach(f => {
    const parts = f.filePath.split('/');
    for (let i = 1; i < parts.length; i++) folders.add(parts.slice(0, i).join('/'));
  });

  function buildNode(prefix) {
    const children = [];
    const directFolders = [...folders].filter(f => {
      const p = f.lastIndexOf('/');
      const parent = p < 0 ? '' : f.substring(0, p);
      return parent === prefix;
    });
    const directFiles = allFiles.filter(f => {
      const p = f.filePath.lastIndexOf('/');
      const parent = p < 0 ? '' : f.filePath.substring(0, p);
      return parent === prefix;
    });

    directFolders.sort().forEach(folder => {
      const name = folder.split('/').pop();
      const row = document.createElement('div');
      row.className = 'tree-row' + (curPath === folder ? ' active' : '');
      row.dataset.path = folder;
      row.innerHTML = `<span class="tree-arrow">▶</span><span class="tree-icon" style="color:var(--warning)">📁</span><span class="tree-name">${esc(name)}</span>`;
      row.addEventListener('click', e => { e.stopPropagation(); navTo(folder); });
      children.push(row);
    });

    directFiles.forEach(f => {
      const name = f.filePath.split('/').pop();
      const ic = fileIcon(name, f.mimeType);
      const row = document.createElement('div');
      row.className = 'tree-row' + (curPath === f.filePath ? ' active' : '');
      row.dataset.path = f.filePath;
      row.innerHTML = `<span style="width:12px"></span><span class="tree-icon" style="width:14px;height:10px;border-radius:2px;background:${ic.color};display:inline-flex;align-items:center;justify-content:center;font-size:.45rem;font-weight:800;color:#fff;margin-right:2px">${ic.label}</span><span class="tree-name">${esc(name)}</span>`;
      row.addEventListener('click', e => { e.stopPropagation(); navTo(prefix); });
      children.push(row);
    });

    return children;
  }

  tree.innerHTML = '';
  const rootItems = buildNode('');
  if (!rootItems.length) { tree.innerHTML = '<div style="padding:10px;font-size:.78rem;color:var(--muted)">Kosong — upload file dulu</div>'; return; }
  rootItems.forEach(el => tree.appendChild(el));
}

// ── Content ───────────────────────────────────────
function renderContent() {
  selected.clear();
  updateSel();

  // Breadcrumb
  const bread = document.getElementById('fm-bread');
  const parts  = curPath ? curPath.split('/') : [];
  let html = `<span class="fm-crumb" data-path="">⌂ root</span>`;
  let built = '';
  parts.forEach((p, i) => {
    built += (built ? '/' : '') + p;
    const cp = built;
    const active = i === parts.length - 1 ? ' current' : '';
    html += `<span class="fm-sep">›</span><span class="fm-crumb${active}" data-path="${esc(cp)}">${esc(p)}</span>`;
  });
  bread.innerHTML = html;
  bread.querySelectorAll('.fm-crumb').forEach(el => {
    el.addEventListener('click', () => navTo(el.dataset.path));
  });

  // Items in current path
  const folders = new Set();
  const files   = [];
  allFiles.forEach(f => {
    const parts2 = f.filePath.split('/');
    const parent = parts2.slice(0, -1).join('/');
    const depth  = curPath ? curPath.split('/').length : 0;

    if (curPath === '') {
      // root: show top-level folders and files
      if (parts2.length === 1) files.push(f);
      else if (parts2.length > 1) folders.add(parts2[0]);
    } else {
      if (!f.filePath.startsWith(curPath + '/')) return;
      const rel   = f.filePath.slice(curPath.length + 1);
      const rParts = rel.split('/');
      if (rParts.length === 1) files.push(f);
      else folders.add(curPath + '/' + rParts[0]);
    }
  });

  const content = document.getElementById('fm-content');
  const total   = folders.size + files.length;
  document.getElementById('status-count').textContent = `${total} item`;
  document.getElementById('status-path').textContent = '/' + curPath;

  if (!total) {
    content.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <div class="empty-title">Folder kosong</div>
      <div class="empty-sub">Upload file atau drag & drop ke sini</div>
    </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'file-grid';

  // Render folders
  [...folders].sort().forEach(fp => {
    const name = fp.split('/').pop();
    const el = document.createElement('div');
    el.className = 'file-item';
    el.dataset.path = fp;
    el.dataset.type = 'folder';
    el.innerHTML = `
      <div class="file-icon" style="background:rgba(245,158,11,.15);font-size:1.5rem;color:var(--warning)">📁</div>
      <div class="file-name">${esc(name)}</div>
      <div class="file-size">Folder</div>
      <div class="file-check"></div>`;
    el.addEventListener('click', e => { if (e.detail === 1) toggleSel(el, fp); });
    el.addEventListener('dblclick', () => navTo(fp));
    el.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, { type:'folder', path: fp, name }); });
    grid.appendChild(el);
  });

  // Render files
  files.forEach(f => {
    const name = f.filePath.split('/').pop();
    const ic   = fileIcon(name, f.mimeType);
    const el   = document.createElement('div');
    el.className = 'file-item';
    el.dataset.path = f.filePath;
    el.dataset.type = 'file';
    el.innerHTML = `
      <div class="file-icon" style="background:${ic.color}22;color:${ic.color}">${ic.label}</div>
      <div class="file-name">${esc(name)}</div>
      <div class="file-size">${fmtBytes(f.size)}</div>
      <div class="file-check"></div>`;
    el.addEventListener('click', () => toggleSel(el, f.filePath));
    el.addEventListener('dblclick', () => openFile(f));
    el.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, { type:'file', path: f.filePath, name, mime: f.mimeType }); });
    grid.appendChild(el);
  });

  content.innerHTML = '';
  content.appendChild(grid);

  // Drop zone if empty
  setupDropZone();
}

function navTo(path) {
  curPath = path;
  renderTree();
  renderContent();
  if (window.innerWidth <= 768) {
    document.getElementById('fm-sidebar').classList.remove('open');
    document.getElementById('fm-overlay').classList.remove('show');
  }
}

// ── Selection ─────────────────────────────────────
function toggleSel(el, path) {
  if (selected.has(path)) { selected.delete(path); el.classList.remove('sel'); }
  else { selected.add(path); el.classList.add('sel'); }
  updateSel();
}
function updateSel() {
  const n = selected.size;
  const selEl = document.getElementById('status-sel');
  const delBtn = document.getElementById('btn-del-sel');
  if (n) { selEl.style.display = 'inline'; selEl.textContent = `${n} dipilih`; delBtn.style.display = 'inline-flex'; }
  else   { selEl.style.display = 'none';   delBtn.style.display = 'none'; }
}

// ── Context menu ──────────────────────────────────
function showCtx(e, item) {
  removeCtx();
  const m = document.createElement('div');
  m.className = 'ctx';
  const isEditable = item.type === 'file' && /text\/|javascript|json|xml|svg/.test(item.mime || '');

  m.innerHTML = `
    ${item.type === 'file' && isEditable ? `<div class="ctx-row" id="cx-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</div>` : ''}
    ${item.type === 'file' ? `<div class="ctx-row" id="cx-dl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</div>` : ''}
    ${item.type === 'file' ? `<div class="ctx-row" id="cx-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview</div>` : ''}
    <div class="ctx-row" id="cx-ren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Rename</div>
    <div class="ctx-sep"></div>
    <div class="ctx-row red" id="cx-del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>Hapus</div>`;

  document.body.appendChild(m);
  ctxMenu = m;

  const mx = Math.min(e.clientX, innerWidth - 190);
  const my = Math.min(e.clientY, innerHeight - m.scrollHeight - 10);
  m.style.left = mx + 'px';
  m.style.top  = my + 'px';

  m.querySelector('#cx-edit')?.addEventListener('click', () => { removeCtx(); editFile(item); });
  m.querySelector('#cx-dl')?.addEventListener('click',   () => { removeCtx(); dlFile(item); });
  m.querySelector('#cx-prev')?.addEventListener('click', () => { removeCtx(); previewFile(item); });
  m.querySelector('#cx-ren')?.addEventListener('click',  () => { removeCtx(); renameItem(item); });
  m.querySelector('#cx-del')?.addEventListener('click',  () => { removeCtx(); deleteItem(item); });

  setTimeout(() => document.addEventListener('click', removeCtx, { once: true }), 50);
}
function removeCtx() { ctxMenu?.remove(); ctxMenu = null; }

// ── File actions ──────────────────────────────────
async function editFile(item) {
  const d = await api(`/file/content/${SRV_ID}?path=${encodeURIComponent(item.path)}`);
  if (!d?.ok) return toast(d?.msg || 'Gagal membaca file.', 'err');

  modal({
    title: `Edit: ${item.name}`,
    body: `<textarea class="input" id="editor" style="height:320px;font-family:monospace;font-size:.82rem;line-height:1.6;resize:vertical">${esc(d.content)}</textarea>`,
    ok: 'Simpan', wide: true,
    onOk: async (el, close) => {
      const content = document.getElementById('editor').value;
      const r = await api(`/file/save/${SRV_ID}`, { method:'PUT', body:{ filePath: item.path, content } });
      if (r?.ok) { toast('Disimpan!', 'ok'); close(); load(); }
      else toast(r?.msg || 'Gagal simpan.', 'err');
    }
  });
}

function dlFile(item) {
  window.open(`/api/file/download/${SRV_ID}?path=${encodeURIComponent(item.path)}`, '_blank');
}

function previewFile(item) {
  window.open(`${location.origin}/s/${SRV_NAME}/${item.path}`, '_blank');
}

async function openFile(f) {
  const name = f.filePath.split('/').pop();
  const isEditable = /text\/|javascript|json|xml|svg/.test(f.mimeType || '');
  const isImage = (f.mimeType || '').startsWith('image/');
  if (isImage) {
    const url = `${location.origin}/s/${SRV_NAME}/${f.filePath}`;
    modal({ title: name, body: `<img src="${url}" style="max-width:100%;border-radius:8px;display:block;margin:0 auto" onerror="this.parentNode.innerHTML='Gagal memuat gambar'">`, ok:'', cancel:'Tutup' });
  } else if (isEditable) {
    editFile({ path: f.filePath, name, mime: f.mimeType });
  } else {
    dlFile({ path: f.filePath });
  }
}

async function renameItem(item) {
  const { bg, close: closeM } = modal({
    title: 'Rename',
    body: `<div class="field"><label>Nama baru</label><input class="input" id="new-name" value="${esc(item.name)}" maxlength="100"></div>`,
    ok: 'Simpan',
    onOk: async (_, cl) => {
      const newName = document.getElementById('new-name').value.trim();
      if (!newName) return toast('Nama tidak boleh kosong.', 'err');
      const r = await api(`/file/rename/${SRV_ID}`, { method:'PUT', body:{ oldPath: item.path, newName } });
      if (r?.ok) { toast('Berhasil rename.', 'ok'); cl(); load(); }
      else toast(r?.msg || 'Gagal.', 'err');
    }
  });
  setTimeout(() => { const inp = document.getElementById('new-name'); inp?.focus(); inp?.select(); }, 100);
}

async function deleteItem(item) {
  confirm('Hapus', `Hapus "${item.name}"?`, async () => {
    let r;
    if (item.type === 'folder') r = await api(`/file/delete-folder/${SRV_ID}`, { method:'DELETE', body:{ folderPath: item.path } });
    else r = await api(`/file/delete/${SRV_ID}`, { method:'DELETE', body:{ filePath: item.path } });
    if (r?.ok) { toast('Dihapus.', 'ok'); load(); }
    else toast(r?.msg || 'Gagal.', 'err');
  }, true);
}

// ── Upload ────────────────────────────────────────
async function uploadFiles(files) {
  const area = document.getElementById('upload-area');
  const list = document.getElementById('upload-list');
  area.style.display = 'block';
  list.innerHTML = '';

  for (const f of files) {
    const row = document.createElement('div');
    row.className = 'upload-item';
    row.innerHTML = `<span class="fname">${esc(f.name)}</span><span class="fsize">${fmtBytes(f.size)}</span><div class="prog-bar" style="width:80px;flex-shrink:0"><div class="prog-fill" style="width:10%"></div></div><span class="fstat">...</span>`;
    list.appendChild(row);
    const bar  = row.querySelector('.prog-fill');
    const stat = row.querySelector('.fstat');

    try {
      const fd = new FormData();
      fd.append('files', f);
      fd.append('folder', curPath);

      bar.style.width = '40%';
      const res  = await fetch(`/api/file/upload/${SRV_ID}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + Store.token() },
        body: fd
      });
      const data = await res.json().catch(() => ({}));
      bar.style.width = '100%';

      if (data.ok) {
        bar.style.background = 'var(--success)';
        stat.textContent = '✓';
        stat.className = 'fstat ok';
      } else {
        bar.style.background = 'var(--danger)';
        stat.textContent = '✕';
        stat.className = 'fstat err';
        toast(data.msg || `Gagal upload ${f.name}`, 'err');
      }
    } catch (_) {
      bar.style.background = 'var(--danger)';
      stat.textContent = '✕';
      stat.className = 'fstat err';
    }
  }

  await load();
  setTimeout(() => { area.style.display = 'none'; list.innerHTML = ''; }, 3000);
}

function setupDropZone() {
  const content = document.getElementById('fm-content');
  content.addEventListener('dragover', e => { e.preventDefault(); content.style.background = 'var(--primary-l)'; });
  content.addEventListener('dragleave', () => { content.style.background = ''; });
  content.addEventListener('drop', e => {
    e.preventDefault();
    content.style.background = '';
    const files = [...e.dataTransfer.files];
    if (files.length) uploadFiles(files);
  });
}

// ── Toolbar actions ───────────────────────────────
document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files.length) uploadFiles([...e.target.files]);
  e.target.value = '';
});

document.getElementById('btn-refresh').addEventListener('click', load);

document.getElementById('btn-dl-all').addEventListener('click', () => {
  window.open(`/api/file/download-all/${SRV_ID}`, '_blank');
});

document.getElementById('btn-mkdir').addEventListener('click', () => {
  modal({
    title: 'Buat Folder Baru',
    body: `<div class="field"><label>Nama Folder</label><input class="input" id="folder-name" placeholder="nama-folder" maxlength="50"></div>`,
    ok: 'Buat',
    onOk: async (_, close) => {
      const name = document.getElementById('folder-name').value.trim().replace(/[^a-zA-Z0-9\-_]/g,'_');
      if (!name) return toast('Nama folder kosong.', 'err');
      const fp = curPath ? `${curPath}/${name}` : name;
      const r = await api(`/file/mkdir/${SRV_ID}`, { method:'POST', body:{ folderPath: fp } });
      if (r?.ok) { toast('Folder dibuat.', 'ok'); close(); load(); }
      else toast(r?.msg || 'Gagal.', 'err');
    }
  });
});

document.getElementById('btn-del-sel').addEventListener('click', () => {
  if (!selected.size) return;
  confirm('Hapus Pilihan', `Hapus ${selected.size} item yang dipilih?`, async () => {
    for (const path of selected) {
      const item = allFiles.find(f => f.filePath === path);
      if (item) await api(`/file/delete/${SRV_ID}`, { method:'DELETE', body:{ filePath: path } });
      else await api(`/file/delete-folder/${SRV_ID}`, { method:'DELETE', body:{ folderPath: path } });
    }
    toast('Item dihapus.', 'ok');
    load();
  }, true);
});

// ── Init ──────────────────────────────────────────
load();
</script>
</body>
