<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar — Ray App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div id="toasts"></div>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2 L2 7 L12 12 L22 7 Z" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 17 L12 22 L22 17" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12 L12 17 L22 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 style="font-size:1.25rem;margin-top:8px">Buat Akun Ray App</h2>
      <p style="font-size:.82rem;color:var(--muted);margin-top:4px">Gratis selamanya, tidak perlu kartu kredit</p>
    </div>

    <div id="err-box" style="display:none"></div>

    <div class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input class="input" type="text" id="username" placeholder="contoh: rayuser123" maxlength="20" autocomplete="username" spellcheck="false">
        <span style="font-size:.72rem;color:var(--subtle)">3–20 karakter, huruf kecil, angka, underscore</span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div style="position:relative">
          <input class="input" type="password" id="password" placeholder="Minimal 6 karakter" autocomplete="new-password" style="padding-right:42px">
          <button type="button" id="eye" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem" title="Tampilkan">&#128065;</button>
        </div>
        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden">
          <div id="pw-bar" style="height:100%;width:0;border-radius:2px;transition:width .2s,background .2s"></div>
        </div>
      </div>

      <div class="field">
        <label for="password2">Ulangi Password</label>
        <input class="input" type="password" id="password2" placeholder="Ketik ulang password" autocomplete="new-password">
      </div>

      <!-- EMOJI CAPTCHA -->
      <div style="background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:14px">
        <div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:8px">Verifikasi Anti-Bot</div>
        <div id="captcha-prompt" style="font-size:.82rem;color:var(--muted);text-align:center;padding:8px;min-height:32px">Memuat...</div>
        <div class="captcha-grid" id="captcha-grid"></div>
        <div id="captcha-status" style="font-size:.75rem;text-align:center;margin-top:6px;min-height:18px;color:var(--muted)">Pilih semua emoji yang sama</div>
        <button type="button" id="captcha-refresh" class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;font-size:.75rem">↺ Muat Ulang Captcha</button>
      </div>

      <div style="display:flex;align-items:flex-start;gap:8px;font-size:.8rem;color:var(--muted)">
        <input type="checkbox" id="terms" style="margin-top:2px;accent-color:var(--primary)">
        <label for="terms">Saya setuju. Server tidak aktif 7 hari akan otomatis dihapus.</label>
      </div>

      <button class="btn btn-primary" id="btn-reg" style="width:100%;padding:12px;font-size:.95rem">Daftar Sekarang</button>

      <p style="text-align:center;font-size:.85rem;color:var(--muted)">
        Sudah punya akun? <a href="/login">Masuk di sini</a>
      </p>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
buildNav('register');
if (Store.token()) location.href = '/dashboard';

// ── State ─────────────────────────────────────────
let captchaToken  = null;  // JWT dari server
let captchaTarget = null;  // id emoji yang benar
let selectedIds   = [];    // id-id yang dipilih user

// ── Load captcha ──────────────────────────────────
async function loadCaptcha() {
  captchaToken  = null;
  captchaTarget = null;
  selectedIds   = [];

  const grid = document.getElementById('captcha-grid');
  const prompt = document.getElementById('captcha-prompt');
  const status = document.getElementById('captcha-status');

  grid.innerHTML = '';
  prompt.textContent = 'Memuat...';
  status.textContent = '';
  status.style.color = 'var(--muted)';

  const data = await api('/auth/captcha');
  if (!data || !data.ok) {
    prompt.textContent = 'Gagal memuat captcha.';
    return;
  }

  captchaToken  = data.token;
  captchaTarget = null; // akan diisi dari captchaToken JWT saat submit
  prompt.innerHTML = `Pilih <strong>semua</strong> emoji <span style="font-size:1.4rem;vertical-align:middle">${data.target}</span> yang ada di kotak bawah`;

  grid.innerHTML = '';
  data.grid.forEach(item => {
    const cell = document.createElement('button');
    cell.type = 'button';
    cell.className = 'captcha-cell';
    cell.textContent = item.e;
    cell.dataset.id = item.id;
    cell.addEventListener('click', () => toggleCell(cell, item.id));
    grid.appendChild(cell);
  });
  status.textContent = 'Pilih semua emoji yang cocok';
}

function toggleCell(cell, id) {
  cell.classList.toggle('selected');
  if (cell.classList.contains('selected')) {
    selectedIds.push(id);
  } else {
    selectedIds = selectedIds.filter(x => x !== id);
  }

  // Validasi: semua yang dipilih harus id yang sama, minimal 2
  const status = document.getElementById('captcha-status');
  const allSame = selectedIds.length >= 2 && selectedIds.every(x => x === selectedIds[0]);
  const hasDiff = selectedIds.some(x => x !== selectedIds[0]);

  if (selectedIds.length === 0) {
    status.textContent = 'Pilih semua emoji yang cocok';
    status.style.color = 'var(--muted)';
  } else if (hasDiff) {
    status.textContent = 'Pilihan berbeda — hanya pilih yang sama';
    status.style.color = 'var(--danger)';
  } else if (allSame) {
    status.textContent = '✓ Pilihan cocok! Lanjutkan daftar.';
    status.style.color = 'var(--success)';
  } else {
    status.textContent = `${selectedIds.length} dipilih — mungkin masih ada lagi?`;
    status.style.color = 'var(--warning)';
  }
}

function getCaptchaAnswer() {
  if (selectedIds.length < 2) return null;
  if (!selectedIds.every(x => x === selectedIds[0])) return null;
  return selectedIds[0];
}

// ── Password strength ─────────────────────────────
document.getElementById('password').addEventListener('input', function() {
  const v = this.value;
  let s = 0;
  if (v.length >= 6) s++;
  if (v.length >= 10) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^a-zA-Z0-9]/.test(v)) s++;
  const bar = document.getElementById('pw-bar');
  const pct = (s / 5) * 100;
  bar.style.width = pct + '%';
  bar.style.background = s <= 1 ? 'var(--danger)' : s <= 3 ? 'var(--warning)' : 'var(--success)';
});

// ── Toggle password visibility ────────────────────
document.getElementById('eye').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.style.color = pw.type === 'text' ? 'var(--primary)' : 'var(--muted)';
});

// ── Refresh captcha ───────────────────────────────
document.getElementById('captcha-refresh').addEventListener('click', loadCaptcha);

// ── Show error ────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('err-box');
  el.className = 'alert alert-red';
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function clearErr() {
  const el = document.getElementById('err-box');
  el.style.display = 'none';
}

// ── Register ──────────────────────────────────────
async function doRegister() {
  clearErr();
  const username  = document.getElementById('username').value.trim().toLowerCase();
  const password  = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const terms     = document.getElementById('terms').checked;

  if (!username)               return showErr('Username wajib diisi.');
  if (!/^[a-z0-9_]{3,20}$/.test(username)) return showErr('Username: 3–20 karakter, huruf kecil/angka/underscore.');
  if (!password)               return showErr('Password wajib diisi.');
  if (password.length < 6)     return showErr('Password minimal 6 karakter.');
  if (password !== password2)  return showErr('Konfirmasi password tidak cocok.');
  if (!terms)                  return showErr('Centang persetujuan syarat penggunaan.');
  if (!captchaToken)           return showErr('Captcha belum dimuat. Klik "Muat Ulang Captcha".');

  const answer = getCaptchaAnswer();
  if (!answer) return showErr('Pilih semua emoji yang sama dengan gambar di atas (minimal 2 pilihan dengan emoji yang sama).');

  const btn = document.getElementById('btn-reg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Mendaftar...';

  const data = await api('/auth/register', {
    method: 'POST',
    body: { username, password, captchaToken, captchaAnswer: answer }
  });

  btn.disabled = false;
  btn.textContent = 'Daftar Sekarang';

  if (!data) return;

  if (data.ok) {
    Store.setAuth(data.token, { username: data.username, role: data.role });
    toast('Akun berhasil dibuat! Selamat datang 🎉', 'ok');
    setTimeout(() => location.href = '/dashboard', 700);
  } else {
    showErr(data.msg || 'Gagal mendaftar.');
    if (data.captchaWrong || data.captchaExpired) {
      document.querySelectorAll('.captcha-cell.selected').forEach(c => c.classList.add('wrong'));
      setTimeout(loadCaptcha, 700);
    }
  }
}

document.getElementById('btn-reg').addEventListener('click', doRegister);
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

loadCaptcha();
</script>
</body>
</html>
